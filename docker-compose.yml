services:
  app:
    image: lizenztool
    restart: unless-stopped
    environment:
      MAX_UPLOAD_MB: "20"
      LOG_LEVEL: "INFO"
    volumes:
      - ./lizenztool.toml:/app/lizenztool.toml:ro
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
