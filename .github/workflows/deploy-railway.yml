name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Deploy to Railway
        uses: liatrio/github-action-railway@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
